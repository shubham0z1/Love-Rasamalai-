<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story ❤️</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#ffdde1,#ee9ca7);
color:white;
text-align:center;
overflow-x:hidden;
}

/* start screen */

#startScreen{
position:fixed;
top:0;
left:0;
height:100vh;
width:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

#startBtn{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
font-size:18px;
cursor:pointer;
}

/* sections */

.section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
opacity:0;
transform:translateY(40px);
transition:1s;
}

.section.show{
opacity:1;
transform:translateY(0);
}

/* polaroid photos */

.photo{
width:260px;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
transform:rotateY(90deg);
transition:1s;
margin-top:20px;
}

.photo img{
width:100%;
border-radius:5px;
}

.photo.reveal{
transform:rotateY(0deg);
}

/* text */

p{
max-width:420px;
font-size:18px;
line-height:1.6;
min-height:90px;
}

/* button */

button{
padding:14px 28px;
border:none;
border-radius:30px;
background:white;
color:#e91e63;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

/* neon message */

.neon{
font-size:34px;
text-shadow:
0 0 5px #ff4da6,
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff4da6;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff4da6}
to{text-shadow:0 0 30px #ff1a75}
}

/* starry sky scene */

#stars{
display:none;
position:relative;
width:100%;
height:300px;
margin-top:30px;
}

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* hug silhouettes */

#hugScene{
display:none;
height:200px;
margin-top:20px;
position:relative;
}

.person{
width:70px;
height:150px;
background:white;
border-radius:40px;
position:absolute;
bottom:0;
}

#p1{
left:35%;
animation:move1 2s forwards;
}

#p2{
right:35%;
animation:move2 2s forwards;
}

@keyframes move1{
to{left:48%}
}

@keyframes move2{
to{right:48%}
}

/* hearts */

.heart{
position:absolute;
font-size:22px;
animation:burst 3s linear forwards;
}

@keyframes burst{
0%{transform:translateY(0) scale(0.5);opacity:1}
100%{transform:translateY(-800px) scale(1.5);opacity:0}
}

</style>
</head>

<body>

<div id="startScreen">
<h1>For Rasamalai ❤️</h1>
<p>Tap to start our story</p>
<button id="startBtn">Start</button>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="section">
<h1>Hi Rasamalai ❤️</h1>
<p id="intro"></p>
</div>

<div class="section">
<div class="photo" id="photo1">
<img src="photo1.jpg">
</div>
<p id="text1"></p>
</div>

<div class="section">
<div class="photo" id="photo2">
<img src="photo2.jpg">
</div>
<p id="text2"></p>
</div>

<div class="section">
<div class="photo" id="photo3">
<img src="photo3.jpg">
</div>
<p id="text3"></p>
</div>

<div class="section">

<h2>Choose the fate of this relationship</h2>
<button onclick="ending()">Choose</button>

<div id="stars"></div>

<div id="hugScene">
<div class="person" id="p1"></div>
<div class="person" id="p2"></div>
</div>

<p id="final"></p>

</div>

<script>

const music=document.getElementById("music")

document.getElementById("startBtn").onclick=function(){

music.play()

document.getElementById("startScreen").style.display="none"

typeWriter("Scroll slowly… I want to show you something.",intro)

}

/* scroll animation */

const sections=document.querySelectorAll(".section")

window.addEventListener("scroll",()=>{
sections.forEach(section=>{
const top=section.getBoundingClientRect().top
if(top<window.innerHeight-100){
section.classList.add("show")
}
})
})

/* typing effect */

function typeWriter(text,element,speed=35){
let i=0
function type(){
if(i<text.length){
element.innerHTML+=text.charAt(i)
i++
setTimeout(type,speed)
}
}
type()
}

/* timeline text */

setTimeout(()=>{
photo1.classList.add("reveal")
typeWriter("This photo looks simple… but it’s actually the moment my life quietly changed. I didn’t know it then, but the girl in this picture would become someone I’d care about more than I expected.",text1)
},2000)

setTimeout(()=>{
photo2.classList.add("reveal")
typeWriter("This was the moment I started feeling romantically for you and my heart started to lose its track and it started to beat for only one person and that's you my baby ❤️",text2)
},4000)

setTimeout(()=>{
photo3.classList.add("reveal")
typeWriter("The moment I realized you are the one and I don't wanna lose you ever Rasamalai ❤️",text3)
},6000)

/* ending scene */

function ending(){

createStars()

document.getElementById("stars").style.display="block"

setTimeout(()=>{
document.getElementById("hugScene").style.display="block"
},2000)

setTimeout(()=>{
final.innerHTML="<span class='neon'>No matter what path this story takes… I still choose you ❤️</span>"
heartExplosion()
},4200)

}

/* star generator */

function createStars(){

const container=document.getElementById("stars")

for(let i=0;i<120;i++){

const star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"%"
star.style.top=Math.random()*100+"%"

container.appendChild(star)

}

}

/* hearts */

function heartExplosion(){

for(let i=0;i<200;i++){

setTimeout(()=>{

const heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.top="80vh"
heart.style.fontSize=(Math.random()*35+12)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),3000)

},i*15)

}

}

</script>

</body>
</html>
