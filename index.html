<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Story ❤️</title><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet"><style>

body{
margin:0;
background:#020111;
color:white;
font-family:'Playfair Display',serif;
overflow-x:hidden;
}

/* GALAXY BACKGROUND */

.sky{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at 30% 30%,#0b1a3a,#020111);
z-index:-2;
}

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:moveStars 60s linear infinite;
z-index:-1;
}

@keyframes moveStars{
0%{transform:translateY(0)}
100%{transform:translateY(-1000px)}
}

/* START SCREEN */

#startScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
cursor:pointer;
z-index:10;
}

#startScreen h1{
font-family:'Great Vibes',cursive;
font-size:50px;
color:#ff4d6d;
}

/* SECTION */

.section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* POLAROID */

.polaroid{
background:white;
padding:12px;
border-radius:8px;
transform:rotate(-5deg) scale(.7);
opacity:0;
transition:1s;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.polaroid img{
width:260px;
border-radius:5px;
}

.polaroid.show{
opacity:1;
transform:rotate(0) scale(1);
}

/* MESSAGE */

.message{
margin-top:25px;
font-family:'Great Vibes',cursive;
font-size:34px;
max-width:700px;
color:#ffd1dc;
min-height:120px;
}

/* HEARTBEAT */

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.section.active{
animation:beat 2s infinite;
}

/* CONSTELLATION */

.constellation-title{
font-family:'Great Vibes',cursive;
font-size:36px;
color:#ffd1dc;
margin-bottom:50px;
}

.sky-map{
position:relative;
width:500px;
height:500px;
}

.star-photo{
width:80px;
height:80px;
border-radius:50%;
position:absolute;
box-shadow:0 0 25px #ff4d6d;
opacity:0;
transform:scale(.5);
transition:2s;
}

.star-photo.show{
opacity:1;
transform:scale(1);
}

.s1{top:180px;left:120px;}
.s2{top:80px;left:250px;}
.s3{top:180px;left:380px;}

.lines{
position:absolute;
width:100%;
height:100%;
stroke:#ff4d6d;
stroke-width:2;
fill:none;
opacity:0;
transition:2s;
}

.lines.show{
opacity:1;
}

/* BUTTON */

button{
margin-top:40px;
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 15px #ff4d6d;
}

/* HEART BURST */

.heart{
position:fixed;
color:red;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px);opacity:1}
100%{transform:translateY(100vh);opacity:0}
}

/* HUG */

.hug{
font-size:80px;
opacity:0;
transition:2s;
}

.hug.show{
opacity:1;
}

/* FINAL NAME */

.final-name{
font-family:'Great Vibes',cursive;
font-size:70px;
color:#ffccd5;
opacity:0;
transition:3s;
}

.final-name.show{
opacity:1;
}

</style></head><body><div class="sky"></div>
<div class="stars"></div><div id="startScreen">
<h1>Tap to start our story ❤️</h1>
<p>Put on headphones</p>
</div><audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio><!-- SCENE 1 --><div class="section"><div class="polaroid">
<img src="photo1.jpg">
</div><div class="message" id="msg1"></div></div><!-- SCENE 2 --><div class="section"><div class="polaroid">
<img src="photo2.jpg">
</div><div class="message" id="msg2"></div></div><!-- SCENE 3 --><div class="section"><div class="polaroid">
<img src="photo3.jpg">
</div><div class="message" id="msg3"></div></div><!-- CONSTELLATION --><div class="section constellation"><h2 class="constellation-title">
If you made it this far…  
<br><br>
it means you matter to me more than you realize.
</h2><div class="sky-map"><img src="photo1.jpg" class="star-photo s1">
<img src="photo2.jpg" class="star-photo s2">
<img src="photo3.jpg" class="star-photo s3"><svg class="lines" viewBox="0 0 500 500">
<line x1="120" y1="180" x2="250" y2="80"/>
<line x1="250" y1="80" x2="380" y2="180"/>
<line x1="120" y1="180" x2="250" y2="350"/>
<line x1="380" y1="180" x2="250" y2="350"/>
</svg></div></div><!-- END --><div class="section"><h2 style="font-family:'Great Vibes';font-size:40px;color:#ff4d6d">
Choose the fate of this relationship
</h2><button onclick="choose()">Choose</button>

<div id="result" class="message"></div><div class="hug" id="hug">🫂</div><div class="final-name" id="name">
You Are My Universe ❤️
</div></div><script>

/* START */

const start=document.getElementById("startScreen")
const music=document.getElementById("music")

start.onclick=()=>{
start.style.display="none"
music.play()
}

/* TYPEWRITER */

function typeText(text,element){
let i=0
let interval=setInterval(()=>{
element.innerHTML+=text.charAt(i)
i++
if(i>=text.length) clearInterval(interval)
},40)
}

/* TEXT */

const m1=`This photo looks simple… but it’s actually the moment my life quietly changed.

I didn’t know it then, but the girl in this picture would become someone I’d care about more than I expected.`

const m2=`This was the moment I started feeling romantically for you and my heart started to lose its track…

It started to beat for only one person and that's you my baby ❤️`

const m3=`The moment I realized you are the one…

and I don't wanna lose you ever rasmalai ❤️`

setTimeout(()=>{typeText(m1,msg1)},1000)
setTimeout(()=>{typeText(m2,msg2)},6000)
setTimeout(()=>{typeText(m3,msg3)},11000)

/* SCROLL REVEAL */

const sections=document.querySelectorAll(".section")
const polaroids=document.querySelectorAll(".polaroid")

window.addEventListener("scroll",()=>{

sections.forEach((sec,i)=>{

let pos=sec.getBoundingClientRect().top

if(pos<window.innerHeight-150){

sec.classList.add("active")

if(polaroids[i]) polaroids[i].classList.add("show")

}

})

const constellation=document.querySelector(".constellation")
if(constellation){

let pos=constellation.getBoundingClientRect().top

if(pos<window.innerHeight-200){

document.querySelectorAll(".star-photo").forEach(s=>s.classList.add("show"))
document.querySelector(".lines").classList.add("show")

}

}

})

/* END */

function choose(){

document.getElementById("result").innerHTML=
"No matter what path this story takes…<br><br>I still choose you ❤️"

document.getElementById("hug").classList.add("show")

document.getElementById("name").classList.add("show")

heartBurst()

}

function heartBurst(){

for(let i=0;i<100;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤"
heart.style.left=Math.random()*100+"%"
heart.style.fontSize=(Math.random()*25+15)+"px"
heart.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)

}

}

</script></body>
</html>
